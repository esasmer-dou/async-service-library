name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
            VERSION="${VERSION/-SNAPSHOT/}"
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          mvn -B -ntp versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -ntp -Ppublic-release deploy

      - name: Create source archive
        shell: bash
        run: |
          git archive --format=zip --output="async-service-library-${RELEASE_VERSION}-sources.zip" HEAD

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            async-service-library-${{ env.RELEASE_VERSION }}-sources.zip
            asl-annotations/target/*.jar
            asl-core/target/*.jar
            asl-mapdb/target/*.jar
            asl-processor/target/*.jar
            asl-spring-boot-starter/target/*.jar
