name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
            VERSION="${VERSION/-SNAPSHOT/}"
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          mvn -B -ntp versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -ntp -Ppublic-release deploy

      - name: Create Source Archive
        shell: bash
        run: |
          git archive --format=zip --output="async-service-library-${RELEASE_VERSION}-sources.zip" HEAD

      - name: Build Release Notes
        shell: bash
        run: |
          cat > .github/release-notes.generated.md <<EOF
          # Async Service Library v${RELEASE_VERSION}
          
          This release publishes the current public package and release line for Async Service Library.
          
          Included in this version:
          
          - compile-time governed service wrappers
          - Spring Boot starter and admin control plane
          - MapDB-backed async execution for \`void\` methods
          - runtime concurrency, stop/start, replay, delete, and clear controls
          - English and Turkish usage documentation
          
          Current boundary:
          
          - runtime \`SYNC -> ASYNC\` switching is supported for \`void\` methods only
          
          Start here:
          
          - README: https://github.com/esasmer-dou/async-service-library
          - usage guide: https://github.com/esasmer-dou/async-service-library/blob/main/USAGE_GUIDE.md
          - sample app: https://github.com/esasmer-dou/async-service-library/tree/main/asl-consumer-sample
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-notes.generated.md
          files: |
            async-service-library-${{ env.RELEASE_VERSION }}-sources.zip
            asl-annotations/target/*.jar
            asl-core/target/*.jar
            asl-mapdb/target/*.jar
            asl-processor/target/*.jar
            asl-spring-boot-starter/target/*.jar
